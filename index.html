<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Aging MAN - EG - Araujo Abreu</title>
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <style>
        :root { --primary: #6A0304; --bg: #f1f3f4; --white: #ffffff; --success: #34a853; --text: #3c4043; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background-color: var(--bg); color: var(--text); }
        .nav-bar { background: var(--primary); display: flex; justify-content: space-between; align-items: center; padding: 0 30px; height: 110px; box-shadow: 0 2px 5px rgba(0,0,0,0.2); position: sticky; top: 0; z-index: 1000; }
        .nav-item { padding: 0 25px; cursor: pointer; font-weight: 500; color: rgba(255,255,255,0.7); line-height: 110px; transition: 0.3s; text-transform: uppercase; display: inline-block; }
        .nav-item.active { color: #fff; border-bottom: 5px solid #fff; }
        .container { max-width: 1800px; margin: 20px auto; padding: 0 20px; }
        .page { display: none; }
        .page.active { display: block; }
        .kpi-container { display: flex; flex-wrap: wrap; gap: 15px; margin-bottom: 25px; }
        .card { background: var(--white); padding: 15px; border-radius: 8px; text-align: center; border-top: 4px solid var(--primary); flex: 1; min-width: 150px; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        .filter-bar { background: white; padding: 15px; border-radius: 8px; margin-bottom: 15px; display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
        .dropdown { position: relative; }
        .dropbtn { background: #f8f9fa; border: 1px solid #dadce0; padding: 10px; border-radius: 6px; cursor: pointer; font-size: 11px; font-weight: bold; min-width: 150px; }
        .dropdown-content { display: none; position: absolute; background: white; min-width: 250px; box-shadow: 0 8px 16px rgba(0,0,0,0.2); z-index: 1100; border-radius: 8px; padding: 10px; }
        .dropdown.show .dropdown-content { display: block; }
        .chart-box { background: white; padding: 20px; border-radius: 8px; margin-bottom: 20px; height: 350px; }
        .table-container { background: white; border-radius: 8px; overflow: auto; max-height: 600px; }
        table { width: 100%; border-collapse: collapse; font-size: 11px; min-width: 1500px; }
        th { background: #f8f9fa; padding: 12px; text-align: left; position: sticky; top: 0; color: var(--primary); z-index: 10; border-bottom: 2px solid #eee; }
        td { padding: 10px; border-bottom: 1px solid #f1f3f4; }
        .upload-card { background: white; padding: 40px; border-radius: 12px; border: 2px dashed #ccc; text-align: center; cursor: pointer; flex: 1; }
        .upload-card.done { border-color: var(--success); background: #f0fff4; border-style: solid; }
        #errorLog { color: white; background: #d93025; padding: 10px; border-radius: 6px; margin-bottom: 10px; display: none; text-align: center; font-weight: bold; }
    </style>
</head>
<body>

<div class="nav-bar">
    <div>
        <div id="nav-upload" class="nav-item active" onclick="switchPage('upload')">1. Arquivos</div>
        <div id="nav-dash" class="nav-item" onclick="switchPage('dashboard')" style="display:none;">2. Painel Aging (EG)</div>
    </div>
    <img src="araujo_abreu_engenharia_logo.jpg" style="height:80px;">
</div>

<div class="container">
    <div id="errorLog"></div>

    <div id="page-upload" class="page active">
        <div style="display: flex; gap: 20px; margin-top: 40px;">
            <div class="upload-card" id="boxAging"><strong>Aging MAN</strong><p id="txtAging">Aguardando aging.xlsx</p><input type="file" id="inAging" hidden></div>
            <div class="upload-card" id="boxWm"><strong>WM Order</strong><p id="txtWm">Aguardando wm_order.xlsx</p><input type="file" id="inWm" hidden></div>
            <div class="upload-card" id="boxExtra" style="border-style: dotted;"><strong>Opcional: Notas</strong><p id="txtExtra">Cruzar Histórico</p><input type="file" id="inExtra" hidden></div>
        </div>
    </div>

    <div id="page-dashboard" class="page">
        <div class="kpi-container" id="kpiContainer"></div>
        <div class="filter-bar">
            <div class="dropdown" id="dropGestor"><button class="dropbtn" onclick="toggleDropdown('dropGestor')">Gestores</button><div class="dropdown-content" id="listGestor"></div></div>
            <div class="dropdown" id="dropOficina"><button class="dropbtn" onclick="toggleDropdown('dropOficina')">Oficinas</button><div class="dropdown-content" id="listOficina"></div></div>
            <div class="dropdown" id="dropEstado"><button class="dropbtn" onclick="toggleDropdown('dropEstado')">Estados</button><div class="dropdown-content" id="listEstado"></div></div>
            <input type="text" id="busca" placeholder="Buscar Protocolo..." onkeyup="filtrar()" style="padding:10px; border:1px solid #ddd; border-radius:6px; width:280px;">
            <button style="background:var(--success); color:white; border:none; padding:12px; border-radius:6px; cursor:pointer; font-weight:bold; margin-left:auto;" onclick="exportar()">Exportar Excel</button>
        </div>
        <div class="chart-box"><canvas id="canvasChart"></canvas></div>
        <div class="table-container"><table><thead><tr><th>Protocolo</th><th>WO</th><th>Aging</th><th>Oficina</th><th>Gestor</th><th>Estado</th><th>Notas Sistema</th><th>Minhas Obs.</th></tr></thead><tbody id="tbody"></tbody></table></div>
    </div>
</div>

<script>
    let dbAging = null, dbWm = null, dbExtra = {}, finalData = [], chartObj = null;
    let filterSel = { gestores: [], oficinas: [], estados: [] };

    window.onload = () => {
        const v = "?v=" + Date.now();
        carregar('aging.xlsx' + v, 'aging');
        carregar('wm_order.xlsx' + v, 'wm');
    };

    async function carregar(url, type) {
        try {
            const res = await fetch(url);
            if (res.ok) processar(await res.arrayBuffer(), type);
        } catch (e) { console.error("Falha auto-load:", type); }
    }

    function bind(box, input, type) {
        document.getElementById(box).onclick = () => document.getElementById(input).click();
        document.getElementById(input).onchange = e => {
            const reader = new FileReader();
            reader.onload = ev => processar(ev.target.result, type);
            reader.readAsArrayBuffer(e.target.files[0]);
        };
    }
    bind('boxAging', 'inAging', 'aging'); bind('boxWm', 'inWm', 'wm'); bind('boxExtra', 'inExtra', 'extra');

    function processar(buf, type) {
        try {
            const wb = XLSX.read(buf);
            const raw = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
            // Limpa nomes de colunas
            const cleanJson = raw.map(row => {
                let newRow = {};
                for (let key in row) { newRow[key.trim().toLowerCase()] = row[key]; }
                return newRow;
            });

            if (type === 'extra') {
                cleanJson.forEach(r => { let p = r['protocolo man'] || r['protocolo']; if(p) dbExtra[String(p).trim()] = r['minhas observações'] || ''; });
                document.getElementById('txtExtra').innerText = "✅ Notas Unidas";
            } else {
                if(type === 'aging') { dbAging = cleanJson; document.getElementById('boxAging').classList.add('done'); document.getElementById('txtAging').innerText="✅ Aging OK"; }
                if(type === 'wm') { dbWm = cleanJson; document.getElementById('boxWm').classList.add('done'); document.getElementById('txtWm').innerText="✅ WM OK"; }
            }
            if(dbAging && dbWm) compilar();
        } catch (err) { mostrarErro("Erro ao processar " + type + ". Verifique o arquivo."); }
    }

    function compilar() {
        const wmMap = {};
        dbWm.forEach(r => { if(r['protocolo pai']) wmMap[String(r['protocolo pai']).trim()] = r; });
        finalData = [];
        const hoje = new Date();

        dbAging.forEach(row => {
            const prot = String(row['protocolo'] || "").trim();
            const site = String(row['site'] || "").toUpperCase();
            
            if (prot.startsWith("MAN") && site === 'EG') {
                const wm = wmMap[prot] || {};
                const dtRaw = row['dt criação'] || row['dt creation'] || row['data criação'];
                let dt = new Date((dtRaw - 25569) * 86400 * 1000);
                if(isNaN(dt.getTime())) dt = new Date(dtRaw);
                const dias = Math.max(0, Math.floor((hoje - dt) / 86400000));
                
                const ofi = String(wm['oficina'] || 'N/A');
                finalData.push({
                    pai: prot, wo: wm['protocolo'] || '-', aging: dias,
                    oficina: ofi, gestor: getG(ofi), estado: wm['estado'] || 'N/A',
                    wm_obs: wm['anotações de trabalho'] || '', minha_obs: dbExtra[prot] || ''
                });
            }
        });

        if(finalData.length === 0) {
            mostrarErro("Nenhum dado 'MAN' com site 'EG' encontrado.");
            return;
        }

        document.getElementById('errorLog').style.display = 'none';
        filterSel.gestores = [...new Set(finalData.map(d => d.gestor))];
        filterSel.oficinas = [...new Set(finalData.map(d => d.oficina))];
        filterSel.estados = [...new Set(finalData.map(d => d.estado))];

        document.getElementById('nav-dash').style.display = 'block';
        switchPage('dashboard');
        filtrar();
    }

    function getG(o) {
        o = o.toUpperCase();
        if (o.includes("MEC") || o.includes("REFRIG")) return "Sérgio";
        if (o.includes("ELÉTR") || o.includes("ELETRO")) return "Leonardo";
        if (o.includes("CIVIL") || o.includes("PINTU") || o.includes("PEDREIRO")) return "Thamiris";
        return "Outros";
    }

    function filtrar() {
        const b = document.getElementById('busca').value.toUpperCase();
        const lista = finalData.filter(d => 
            filterSel.gestores.includes(d.gestor) && filterSel.oficinas.includes(d.oficina) && 
            filterSel.estados.includes(d.estado) && (d.pai.includes(b) || d.wo.includes(b))
        );
        renderCheck('listGestor', [...new Set(finalData.map(d => d.gestor))], 'gestores');
        renderCheck('listOficina', [...new Set(finalData.map(d => d.oficina))], 'oficinas');
        renderCheck('listEstado', [...new Set(finalData.map(d => d.estado))], 'estados');
        updateDash(lista);
    }

    function updateDash(lista) {
        // KPIs
        const res = lista.reduce((acc, c) => { acc[c.oficina] = (acc[c.oficina] || 0) + 1; return acc; }, {});
        document.getElementById('kpiContainer').innerHTML = `<div class="card total-card"><h3>TOTAL MAN (EG)</h3><p>${lista.length}</p></div>` + 
            Object.entries(res).sort((a,b)=>b[1]-a[1]).map(([o, q])=>`<div class="card"><h3>${o}</h3><p>${q}</p></div>`).join('');

        // Tabela
        document.getElementById('tbody').innerHTML = lista.map(d => `<tr><td><b>${d.pai}</b></td><td>${d.wo}</td><td style="color:${d.aging>=75?'red':'black'}; font-weight:bold">${d.aging}d</td><td>${d.oficina}</td><td>${d.gestor}</td><td>${d.estado}</td><td style="font-size:10px; color:#666">${d.wm_obs}</td><td><input type="text" class="input-obs" value="${d.minha_obs}" onchange="salvar('${d.pai}', this.value)"></td></tr>`).join('');

        // Gráfico Decrescente
        const ctg = lista.reduce((acc, cur) => { const l = cur.aging + " d"; acc[l] = (acc[l] || 0) + 1; return acc; }, {});
        const labels = Object.keys(ctg).sort((a,b) => parseInt(b) - parseInt(a));
        if (chartObj) chartObj.destroy();
        chartObj = new Chart(document.getElementById('canvasChart'), {
            type: 'bar',
            data: { labels: labels, datasets: [{ data: labels.map(l => ctg[l]), backgroundColor: '#6A0304', borderRadius: 5 }] },
            options: { responsive: true, maintainAspectRatio: false, plugins: { legend: false, datalabels: { display: true, anchor: 'end', align: 'top', color: '#6A0304', font: { weight: 'bold' } } }, scales: { y: { display: false }, x: { grid: { display: false } } } },
            plugins: [ChartDataLabels]
        });
    }

    function renderCheck(id, itens, chave) {
        document.getElementById(id).innerHTML = itens.sort().map(i => `<label style="display:block; padding:4px;"><input type="checkbox" value="${i}" ${filterSel[chave].includes(i)?'checked':''} onchange="sync('${chave}', this)"> ${i}</label>`).join('');
    }

    function sync(c, el) { if(el.checked) { if(!filterSel[c].includes(el.value)) filterSel[c].push(el.value); } else { filterSel[c] = filterSel[c].filter(v => v !== el.value); } filtrar(); }
    function salvar(p, v) { const i = finalData.find(d => d.pai === p); if(i) i.minha_obs = v; }
    function toggleDropdown(id) { document.querySelectorAll('.dropdown').forEach(d => d.id === id ? d.classList.toggle('show') : d.classList.remove('show')); }
    function switchPage(p) { document.querySelectorAll('.page, .nav-item').forEach(e => e.classList.remove('active')); document.getElementById('page-'+p).classList.add('active'); document.getElementById('nav-'+p).classList.add('active'); }
    function mostrarErro(m) { const e = document.getElementById('errorLog'); e.innerText = m; e.style.display = 'block'; }
    function exportar() {
        const ws = XLSX.utils.json_to_sheet(finalData.map(d => ({ "Protocolo MAN": d.pai, "WO": d.wo, "Aging": d.aging, "Oficina": d.oficina, "Gestor": d.gestor, "Estado": d.estado, "Obs Sistema": d.wm_obs, "Minhas Observações": d.minha_obs })));
        const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, "Aging"); XLSX.writeFile(wb, "Relatorio_Aging_EG.xlsx");
    }
    window.onclick = e => { if(!e.target.matches('.dropbtn') && !e.target.closest('.dropdown-content')) document.querySelectorAll('.dropdown').forEach(d => d.classList.remove('show')); };
</script>
</body>
</html>
